version: '3.8'

services:
  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=cms_dash
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=secret123
    volumes:
      # VOLUME INI YANG MEMBUAT AUTO-UPDATE!
      # Format: ./folder-local:/path-di-container
      - ./:/var/www/html                    # Semua file project
      - ./vendor:/var/www/html/vendor       # Composer dependencies
      - ./node_modules:/var/www/html/node_modules  # NPM dependencies (kalau ada)
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - laravel-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: laravel-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cms_dash
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: secret123
      MYSQL_ROOT_PASSWORD: rootpassword123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel-network

  # phpMyAdmin (Optional)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: laravel-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword123
    depends_on:
      - mysql
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local